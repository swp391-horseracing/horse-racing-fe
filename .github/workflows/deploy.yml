name: Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build Front-End
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push fe image
        run: |
          docker compose -f .docker/compose.build.yaml build
          docker compose -f .docker/compose.build.yaml push

  deploy:
    name: Deploy
    needs: [build]
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io/${{ github.repository }}

      PORT: ${{ secrets.PORT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove old iamge
        run: docker image prune -a -f
      - name: Deploy Api
        run: docker compose -f .docker/compose.yaml -p horse-racing-fe up -d
